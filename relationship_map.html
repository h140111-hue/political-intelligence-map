<html>
<head><meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"><meta charset="utf-8" /></head>
<body><style>
#__auth-overlay {
  position: fixed; inset: 0; z-index: 99999;
  background: #0b1020; color: #e5e7eb;
  display: flex; align-items: center; justify-content: center;
  font-family: -apple-system, BlinkMacSystemFont, "Pretendard", sans-serif;
}
#__auth-overlay .box {
  background: #1a1d2e; padding: 32px 36px; border-radius: 14px;
  border: 1px solid #2a2f45; min-width: 320px; max-width: 90vw;
}
#__auth-overlay h2 { margin: 0 0 16px; font-size: 18px; color: #fff; }
#__auth-overlay input {
  width: 100%; padding: 12px 14px; box-sizing: border-box;
  background: #0b1020; border: 1px solid #2a2f45; border-radius: 8px;
  color: #fff; font-size: 16px; margin-bottom: 12px;
}
#__auth-overlay button {
  width: 100%; padding: 12px; background: linear-gradient(135deg,#7c8cf8,#6366f1);
  color: #fff; border: none; border-radius: 8px; font-size: 15px;
  font-weight: 600; cursor: pointer;
}
#__auth-overlay button:hover { transform: translateY(-1px); }
#__auth-overlay .msg { color: #f87171; font-size: 13px; margin-top: 10px; min-height: 18px; }
body.__locked { overflow: hidden !important; }
</style>
<div id="__auth-overlay">
  <div class="box">
    <h2>🔒 정치역학 인텔리전스 (잠금)</h2>
    <input id="__pw" type="password" placeholder="비밀번호" autocomplete="off" autofocus />
    <button id="__btn">확인</button>
    <div class="msg" id="__msg"></div>
  </div>
</div>
<script>
(function() {
  document.body && document.body.classList.add('__locked');
  const H = 'afd679cd3f9a81fd9ce02e6434a24f848937f09909fabcc3b3781e06036e284c';
  async function check() {
    const v = document.getElementById('__pw').value;
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(v));
    const hex = Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
    if (hex === H) {
      const o = document.getElementById('__auth-overlay'); if (o) o.remove();
      document.body.classList.remove('__locked');
    } else {
      document.getElementById('__msg').textContent = '접근 불가';
    }
  }
  document.getElementById('__btn').addEventListener('click', check);
  document.getElementById('__pw').addEventListener('keydown', e => { if (e.key === 'Enter') check(); });
})();
</script>

<style>
/* 모바일 호환 — 전체 화면 사용 + flex column */
html, body { margin:0; padding:0; height:100vh; overflow:hidden;
  font-family:-apple-system,BlinkMacSystemFont,'Pretendard',sans-serif;
  -webkit-text-size-adjust:100%; }
body { display:flex; flex-direction:column; }
/* Plotly inline style 강제 오버라이드 — 남은 공간 전체 차지.
   Plotly to_html 은 #__graph 를 익명 <div> 래퍼로 감싸 body 직계자식으로 넣는데
   이 래퍼가 flex sizing 없으면 자식 자연 높이로 축소된다 (→ 그래프 상단 절반만 표시).
   body > div:not(...) 선택자로 UI chrome 외 모든 body 직계 div 를 flex 채움. */
#__graph, .js-plotly-plot, .plot-container, .plotly-graph-div,
body > div:not(.__pio-bar):not(#__pioModalBg):not(#__auth-overlay) {
  flex:1 1 auto !important; min-height:0 !important;
  width:100% !important; height:100% !important; }
/* 모바일 터치 제스처가 Plotly 까지 전달되도록 브라우저 기본 동작 차단
   (핀치 줌인/아웃, 두 손가락 팬, 더블탭 줌) */
#__graph, .js-plotly-plot, .plot-container, .plotly-graph-div,
#__graph svg, .plotly-graph-div svg {
  touch-action:none !important;
  -ms-touch-action:none !important; }
.__pio-bar { padding:10px 16px; background:#f0f2f5;
  border-bottom:1px solid #d0d4dc;
  display:flex; align-items:center; gap:10px; flex-wrap:wrap;
  flex:0 0 auto; }
.__pio-bar button { background:#fff; border:1px solid #c0c4cc; padding:6px 14px;
  border-radius:6px; cursor:pointer; font-size:13px; color:#2c3e50;
  touch-action:manipulation; }
.__pio-bar button:hover { background:#fafbfc; }
.__pio-modal-bg { display:none; position:fixed; inset:0; z-index:99998;
  background:rgba(11,16,32,0.55); align-items:center; justify-content:center;
  padding:16px; box-sizing:border-box; }
.__pio-modal { background:#fff; border-radius:12px; padding:22px 24px;
  width:min(720px, 100%); max-height:80vh; overflow-y:auto;
  box-shadow:0 18px 50px rgba(0,0,0,0.25); color:#2c3e50;
  -webkit-overflow-scrolling:touch; }
.__pio-modal h2 { margin:0 0 6px; font-size:18px; }
.__pio-modal .meta { color:#7f8c8d; font-size:12px; margin-bottom:14px; }
.__pio-modal .close { float:right; cursor:pointer; font-size:24px; color:#888;
  margin-top:-6px; line-height:1; padding:0 6px; }
.__pio-modal .event { border-top:1px solid #ecf0f1; padding:10px 0; }
.__pio-modal .event:first-of-type { border-top:0; }
.__pio-modal .event-date { color:#7f8c8d; font-size:11px; }
.__pio-modal .event-title { font-size:14px; margin:3px 0; word-break:break-word; }
.__pio-modal .event-cats { font-size:11px; color:#3498db; word-break:break-word; }
.__pio-modal .empty { color:#999; padding:14px 0; }
@media (max-width: 640px) {
  .__pio-bar { padding:8px 12px; gap:8px; font-size:12px; }
  .__pio-bar button { padding:6px 10px; font-size:12px; }
  .__pio-bar > span { display:none; }  /* 좁은 화면에서는 통계 텍스트 숨김 */
}

<div class="__pio-bar">
  <strong style="color:#2c3e50;font-size:14px;">표시 설정</strong>
  <button id="__toggleIsolated" type="button" onclick="__toggleIsolatedNodes()">
    고립 노드 표시: <span id="__toggleState" style="font-weight:600;color:#e74c3c;">OFF</span>
  </button>
  <span style="color:#666;font-size:12px;">
    관계망 인물 18명 · 고립 인물 32명 · 노드 클릭 시 이벤트 목록
  </span>
</div>
<div id="__pioModalBg" class="__pio-modal-bg" onclick="__closeModal(event)">
  <div class="__pio-modal" onclick="event.stopPropagation()">
    <span class="close" onclick="__closeModal()">&times;</span>
    <h2 id="__pioModalName">—</h2>
    <div class="meta" id="__pioModalMeta">—</div>
    <div id="__pioModalEvents"></div>
  </div>

<script>
function __toggleIsolatedNodes() {
  var gd = document.getElementById('__graph');
  if (!gd || !gd.data) return;
  var idx = gd.data.findIndex(function(t){ return t.name === '고립 노드'; });
  if (idx < 0) {
    var s = document.getElementById('__toggleState');
    if (s) { s.textContent = '없음'; s.style.color = '#999'; }
    return;
  }
  var cur = gd.data[idx].visible;
  var next = (cur === false || cur === 'legendonly') ? true : false;
  Plotly.restyle(gd, {visible: next}, [idx]);
  var s = document.getElementById('__toggleState');
  if (s) {
    s.textContent = next ? 'ON' : 'OFF';
    s.style.color = next ? '#27ae60' : '#e74c3c';
  }
}

function __escape(s) {
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function __showPerson(cd) {
  document.getElementById('__pioModalName').textContent = cd.name || '?';
  var meta = '직위: ' + (cd.position || '?') + ' · 소속 라인: ' + (cd.line || '?')
           + ' · 위험도: ' + (cd.risk == null ? '?' : cd.risk);
  document.getElementById('__pioModalMeta').textContent = meta;
  var box = document.getElementById('__pioModalEvents');
  var events = cd.events || [];
  if (!events.length) {
    box.innerHTML = '<div class="empty">관련 이벤트가 없습니다.</div>';
  } else {
    var html = '';
    events.forEach(function(e) {
      var cats = (e.categories || []).join(' · ');
      var strat = (e.strategies || []).join(' · ');
      html += '<div class="event">'
            + '<div class="event-date">' + __escape(e.date) + ' · 영향도 ' + __escape(e.impact) + '</div>'
            + '<div class="event-title">' + __escape(e.title) + '</div>'
            + (cats ? '<div class="event-cats">📂 ' + __escape(cats) + '</div>' : '')
            + (strat ? '<div class="event-cats">🎯 ' + __escape(strat) + '</div>' : '')
            + '</div>';
    });
    box.innerHTML = html;
  }
  document.getElementById('__pioModalBg').style.display = 'flex';
}

function __closeModal(e) {
  if (e && e.target.id !== '__pioModalBg' && e.target.className !== 'close') return;
  document.getElementById('__pioModalBg').style.display = 'none';
}

function __dist(t1, t2) {
  var dx = t1.clientX - t2.clientX;
  var dy = t1.clientY - t2.clientY;
  return Math.sqrt(dx*dx + dy*dy);
}

function __attachInteractions() {
  var gd = document.getElementById('__graph');
  // Plotly 가 _fullLayout 을 완성한 뒤에야 dragmode/range 안전하게 만짐
  if (!gd || !gd.on || !gd._fullLayout) {
    setTimeout(__attachInteractions, 300);
    return;
  }
  if (gd.__handlersAttached) return;
  gd.__handlersAttached = true;

  // [1] newPlot 후 dragmode='pan' 명시 적용 — 일부 빌드에서 layout 의 dragmode 가 무시되는 경우 우회
  if (gd._fullLayout.dragmode !== 'pan') {
    Plotly.relayout(gd, { dragmode: 'pan' });
  }

  // [2] 클릭 → 인물 상세 모달
  gd.on('plotly_click', function(data) {
    if (!data || !data.points || !data.points[0]) return;
    var pt = data.points[0];
    if (pt.customdata) __showPerson(pt.customdata);
  });

  // [3] 네이티브 핀치 줌 — Plotly 모바일 multi-touch 미작동 우회
  //     두 손가락 거리 변화를 추적해 Plotly.relayout 으로 xaxis/yaxis range 직접 조정
  //     줌 앵커 = 두 손가락 중점 (해당 지점 좌표가 화면상 위치를 유지하도록 스케일)
  var pinch = null;
  function captureRange() {
    var fl = gd._fullLayout;
    var xr = (fl && fl.xaxis && fl.xaxis.range) ? fl.xaxis.range.slice() : null;
    var yr = (fl && fl.yaxis && fl.yaxis.range) ? fl.yaxis.range.slice() : null;
    return (xr && yr) ? { xr: xr, yr: yr } : null;
  }
  gd.addEventListener('touchstart', function(e) {
    if (e.touches.length === 2) {
      var snap = captureRange();
      if (!snap) return;
      var t1 = e.touches[0], t2 = e.touches[1];
      var rect = gd.getBoundingClientRect();
      var s = gd._fullLayout._size || { l:0, t:0, w:rect.width, h:rect.height };
      var cx = (t1.clientX + t2.clientX) / 2 - rect.left - s.l;
      var cy = (t1.clientY + t2.clientY) / 2 - rect.top - s.t;
      var fx = Math.max(0, Math.min(1, cx / s.w));
      var fy = Math.max(0, Math.min(1, cy / s.h));
      pinch = {
        d0: __dist(t1, t2),
        xr0: snap.xr,
        yr0: snap.yr,
        ax: snap.xr[0] + fx * (snap.xr[1] - snap.xr[0]),
        ay: snap.yr[1] - fy * (snap.yr[1] - snap.yr[0])  // 화면 y 는 위→아래, 축 y 는 아래→위
      };
    }
  }, { passive: true });
  gd.addEventListener('touchmove', function(e) {
    if (e.touches.length === 2 && pinch) {
      e.preventDefault();
      var d1 = __dist(e.touches[0], e.touches[1]);
      if (d1 < 1) return;
      var scale = pinch.d0 / d1;  // <1 줌인 (범위 축소), >1 줌아웃
      scale = Math.max(0.05, Math.min(20, scale));
      Plotly.relayout(gd, {
        'xaxis.range': [
          pinch.ax - (pinch.ax - pinch.xr0[0]) * scale,
          pinch.ax + (pinch.xr0[1] - pinch.ax) * scale
        ],
        'yaxis.range': [
          pinch.ay - (pinch.ay - pinch.yr0[0]) * scale,
          pinch.ay + (pinch.yr0[1] - pinch.ay) * scale
        ]
      });
    }
  }, { passive: false });
  gd.addEventListener('touchend',   function(e){ if (e.touches.length < 2) pinch = null; });
  gd.addEventListener('touchcancel', function(){ pinch = null; });
}
window.addEventListener('load', function(){ setTimeout(__attachInteractions, 200); });
document.addEventListener('keydown', function(e){ if (e.key === 'Escape') __closeModal({target:{id:'__pioModalBg'}}); });
</script>
