<body><style>
#__auth-overlay {
  position: fixed; inset: 0; z-index: 99999;
  background: #0b1020; color: #e5e7eb;
  display: flex; align-items: center; justify-content: center;
  font-family: -apple-system, BlinkMacSystemFont, "Pretendard", sans-serif;
}
#__auth-overlay .box {
  background: #1a1d2e; padding: 32px 36px; border-radius: 14px;
  border: 1px solid #2a2f45; min-width: 320px; max-width: 90vw;
}
#__auth-overlay h2 { margin: 0 0 16px; font-size: 18px; color: #fff; }
#__auth-overlay input {
  width: 100%; padding: 12px 14px; box-sizing: border-box;
  background: #0b1020; border: 1px solid #2a2f45; border-radius: 8px;
  color: #fff; font-size: 16px; margin-bottom: 12px;
}
#__auth-overlay button {
  width: 100%; padding: 12px; background: linear-gradient(135deg,#7c8cf8,#6366f1);
  color: #fff; border: none; border-radius: 8px; font-size: 15px;
  font-weight: 600; cursor: pointer;
}
#__auth-overlay button:hover { transform: translateY(-1px); }
#__auth-overlay .msg { color: #f87171; font-size: 13px; margin-top: 10px; min-height: 18px; }
body.__locked { overflow: hidden !important; }
</style>
<div id="__auth-overlay">
  <div class="box">
    <h2>🔒 정치역학 인텔리전스 (잠금)</h2>
    <input id="__pw" type="password" placeholder="비밀번호" autocomplete="off" autofocus />
    <button id="__btn">확인</button>
    <div class="msg" id="__msg"></div>
  </div>
</div>
<script>
(function() {
  document.body && document.body.classList.add('__locked');
  const H = 'afd679cd3f9a81fd9ce02e6434a24f848937f09909fabcc3b3781e06036e284c';
  async function check() {
    const v = document.getElementById('__pw').value;
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(v));
    const hex = Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
    if (hex === H) {
      const o = document.getElementById('__auth-overlay'); if (o) o.remove();
      document.body.classList.remove('__locked');
    } else {
      document.getElementById('__msg').textContent = '접근 불가';
    }
  }
  document.getElementById('__btn').addEventListener('click', check);
  document.getElementById('__pw').addEventListener('keydown', e => { if (e.key === 'Enter') check(); });
})();
</script>

<script>
function __toggleIsolatedNodes() {
  var gd = document.getElementById('__graph');
  if (!gd || !gd.data) return;
  var idx = gd.data.findIndex(function(t){ return t.name === '고립 노드'; });
  if (idx < 0) {
    var s = document.getElementById('__toggleState');
    if (s) { s.textContent = '없음'; s.style.color = '#999'; }
    return;
  }
  var cur = gd.data[idx].visible;
  var next = (cur === false || cur === 'legendonly') ? true : false;
  Plotly.restyle(gd, {visible: next}, [idx]);
  var s = document.getElementById('__toggleState');
  if (s) {
    s.textContent = next ? 'ON' : 'OFF';
    s.style.color = next ? '#27ae60' : '#e74c3c';
  }
}
</script>

003c\u002fb\u003e\u003cbr\u003e직위: 과장\u003cbr\u003e소속 라인: 이석춘계\u003cbr\u003e관계: 동료\u003cbr\u003e위험도: 3\u003cbr\u003e대응: 만성적 우군 아님. 이석춘에게 정보 전달될 수 있음 가정. 직원검색 프로그램 주었음에도 반응 약했던 건 안큐 상태 — 다음 제공 시 신중.","\u003cb\u003e김다해\u003c\u002fb\u003e\u003cbr\u003e직위: 대리\u003cbr\u003e소속 라인: 미분류\u003cbr\u003e관계: 동료\u003cbr\u003e위험도: 2\u003cbr\u003e대응: 학예팀 내부에서 영향 받지 않고 독립적 판단 가능성. 일단 앞으로 앱·도구는 김다해에게만 전달. 잠재적 동맹.","\u003cb\u003e김동초\u003c\u002fb\u003e\u003cbr\u003e직위: 과장\u003cbr\u003e소속 라인: 이석춘계\u003cbr\u003e관계: 동료\u003cbr\u003e위험도: 3\u003cbr\u003e대응: 인사도 이제 생략. 그가 대하는 만큼만 대할 것. 작은 신호에 감정 소마하지 말 것.","\u003cb\u003e황혜지\u003c\u002fb\u003e\u003cbr\u003e직위: ?\u003cbr\u003e소속 라인: 이석춘계\u003cbr\u003e관계: 동료\u003cbr\u003e위험도: 3\u003cbr\u003e대응: 법적 근거는 계속 문서로 요구. 감정 대응 금물. 박지현과의 친밀함을 인지하고 전제한 상태에서 행동. 장기적으로는 공식 노무부 진정 또는 감사 라인 고려 쓰임.","\u003cb\u003e박희은\u003c\u002fb\u003e\u003cbr\u003e직위: 외부\u003cbr\u003e소속 라인: 미분류\u003cbr\u003e관계: 외부 파트너\u003cbr\u003e위험도: 1\u003cbr\u003e대응: 정재은과 분리된 채널. 화댓대받지 않도록 상호 존중한 관계 구축. 시청 정보 채널로 가치 평가.","\u003cb\u003e홍진곤\u003c\u002fb\u003e\u003cbr\u003e직위: 차장\u003cbr\u003e소속 라인: 중립\u003cbr\u003e관계: 동료\u003cbr\u003e위험도: 3\u003cbr\u003e대응: 자문 요청 다시 간단히 시도하지 말 것 — 3회 연속 거절, 4회재는 약속 끌. 무시한다는 판단. 대체 경로 찾을 것. 민감한 정보 공유 금지.","\u003cb\u003e노용국\u003c\u002fb\u003e\u003cbr\u003e직위: 차장\u003cbr\u003e소속 라인: 중립\u003cbr\u003e관계: 동료\u003cbr\u003e위험도: 2\u003cbr\u003e대응: 과거 호의가 있었다는 점 기억. 제3자 변수에 의해 거리 두기 — 조심스럽게 신뢰 유지.","\u003cb\u003e김수현\u003c\u002fb\u003e\u003cbr\u003e직위: 차장\u003cbr\u003e소속 라인: 미분류\u003cbr\u003e관계: 동료\u003cbr\u003e위험도: 3\u003cbr\u003e대응: 위에서 내려보는 태도 — 상대하지 않으는 것이 최선. 필요 시 업무적 협업에만 집중, 사적 관계 매지 말 것.","\u003cb\u003e기멉상\u003c\u002fb\u003e\u003cbr\u003e직위: 차장\u003cbr\u003e소속 라인: 중립\u003cbr\u003e관계: 동료\u003cbr\u003e위험도: 2\u003cbr\u003e대응: 박물관운영규정·내규 관련 공식 협의 대상. 부장이 매개하는 채널. 의견 충돌 생기면 공식 문서로 남길.","\u003cb\u003e신우섭\u003c\u002fb\u003e\u003cbr\u003e직위: 부장\u003cbr\u003e소속 라인: 이석춘계\u003cbr\u003e관계: 라이벌\u003cbr\u003e위험도: 4\u003cbr\u003e대응: 전술적 점심 거절. 만나면 기계적으로 인사만. 자기 발언에 웃지도 말고 반응하지 말 것 — 정보를 주면 그게 이간질 재료가 됨. 목록에 올려두고 관찰.","\u003cb\u003e오세춘\u003c\u002fb\u003e\u003cbr\u003e직위: 부장\u003cbr\u003e소속 라인: 미분류\u003cbr\u003e관계: 상위 권력\u003cbr\u003e위험도: 1\u003cbr\u003e대응: 퇴임함으로 직접적 리스크 소멸. 다만 이 라인과의 연결이 다른 인물(주정국 등)을 통해 지속될 수 있으니 간접 영향력은 모니터링 필요.","\u003cb\u003e유제형\u003c\u002fb\u003e\u003cbr\u003e직위: 차장\u003cbr\u003e소속 라인: 이석춘계\u003cbr\u003e관계: 라이벌\u003cbr\u003e위험도: 3\u003cbr\u003e대응: 본인보다 신우섭이 주문제. 공식 업무에서만 만남. 정보 공유는 보수적.","\u003cb\u003e강미정\u003c\u002fb\u003e\u003cbr\u003e직위: ?\u003cbr\u003e소속 라인: 본인 우군\u003cbr\u003e관계: 우군\u003cbr\u003e위험도: 1\u003cbr\u003e대응: 장기 신뢰 자산. 정기 소통.","\u003cb\u003e장수진\u003c\u002fb\u003e\u003cbr\u003e직위: ?\u003cbr\u003e소속 라인: 대표계\u003cbr\u003e관계: 동료\u003cbr\u003e위험도: 3\u003cbr\u003e대응: 정보 유출 전제로 행동. 민감한 사안 · 강한 감정 표현 금물. 고위험은 아니지만 엄연한 대표의 귀로 간주. 대체 직원에 불과한 지위 대비 권위의식이 크므로 장기…"],"marker":{"color":["#bdc3c7","#bdc3c7","#bdc3c7","#bdc3c7","#95a5a6","#bdc3c7","#bdc3c7","#e74c3c","#2ecc71","#bdc3c7","#bdc3c7","#e74c3c","#e74c3c","#bdc3c7","#bdc3c7","#95a5a6","#bdc3c7","#bdc3c7","#e74c3c","#bdc3c7","#e74c3c","#e74c3c","#bdc3c7","#95a5a6","#95a5a6","#bdc3c7","#95a5a6","#e74c3c","#bdc3c7","#e74c3c","#2ecc71","#9b59b6"],"line":{"color":"#222","width":1},"size":[20,12,12,12,20,24,16,24,16,24,28,24,24,16,20,20,24,20,24,20,24,24,16,24,20,24,20,28,16,24,16,24]},"mode":"markers+text","name":"고립 노드","text":["김경수","유진우","안수미","홍기선","안수미","유제형","최준영","김동초","김다해","황혜지","권종철","홍진곤","이성훈","오윤미","한찬섭","김스영(금병상)","권종철","한찬섭","이성훈","김다해","김동초","황혜지","박희은","홍진곤","노용국","김수현","기멉상","신우섭","오세춘","유제형","강미정","장수진"],"textfont":{"color":"#2c3e50","size":10},"textposition":"top center","visible":false,"x":[-0.5993705391498392,-0.3085758956680502,-0.017781252186261254,0.2730133912955278,0.5638080347773166,0.8546026782591057,-0.5993705391498392,-0.3085758956680502,-0.017781252186261254,0.2730133912955278,0.5638080347773166,0.8546026782591057,-0.5993705391498392,-0.3085758956680502,-0.017781252186261254,0.2730133912955278,0.5638080347773166,0.8546026782591057
